services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seataero}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seataero_dev}
      POSTGRES_DB: ${POSTGRES_DB:-seataero}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seataero"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
